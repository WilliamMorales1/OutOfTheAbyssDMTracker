root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/oota.exe ./cmd/oota"
  bin = "./tmp/oota.exe"
  include_ext = ["go", "sql"]
  exclude_dir = ["tmp", "internal/db/sqlc", "images", "notes"]
  exclude_regex = ["_test.go"]
  delay = 200
  stop_on_error = true

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true

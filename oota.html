<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Out of the Abyss - DM Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-dark text-light">

  <header class="bg-black py-3 mb-4 border-bottom border-secondary">
    <div class="container">
      <h1 class="display-5 fw-bold text-warning mb-0">⚔️ Out of the Abyss</h1>
      <small class="text-secondary">DM Tracker</small>
    </div>
  </header>

  <div class="container">
    <ul class="nav nav-tabs border-secondary mb-3" id="tabs">
      <li class="nav-item">
        <button class="nav-link active text-light" hx-get="/panel/locations" hx-target="#panel"
          hx-swap="innerHTML">Locations</button>
      </li>
      <li class="nav-item">
        <button class="nav-link text-light" hx-get="/panel/npcs" hx-target="#panel" hx-swap="innerHTML">NPCs</button>
      </li>
      <li class="nav-item">
        <button class="nav-link text-light" hx-get="/panel/encounters" hx-target="#panel"
          hx-swap="innerHTML">Encounters</button>
      </li>
      <li class="nav-item">
        <button class="nav-link text-light" hx-get="/panel/events" hx-target="#panel"
          hx-swap="innerHTML">Events</button>
      </li>
      <li class="nav-item">
        <button class="nav-link text-light" hx-get="/panel/chat" hx-target="#panel" hx-swap="innerHTML">Ask
          Agent</button>
      </li>
    </ul>

    <div id="panel" class="bg-secondary bg-opacity-10 rounded p-3" hx-get="/panel/locations" hx-trigger="load"
      hx-swap="innerHTML"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
    integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
